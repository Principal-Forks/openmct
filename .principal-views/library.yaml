# Principal View Component Library
version: "1.0.0"
name: "OpenMCT Component Library"
description: "Architecture component library for NASA's Open MCT (Mission Control Technologies)"

# Service resource registry
resources:
  openmct-app:
    service.name: "openmct"
    service.version: "1.0.0"
    deployment.environment: "development"

nodeComponents:
  # Core Framework
  mct-core:
    defaultLabel: "MCT Core"
    description: "Main MCT class - application entry point and initialization"
    color: "#FF6B6B"
    icon: "Settings"

  # API Layer Components
  api-module:
    defaultLabel: "API Module"
    description: "Core API module providing extensibility points"
    color: "#4ECDC4"
    icon: "Plug"

  object-api:
    defaultLabel: "Object API"
    description: "Domain object loading, saving, searching, and lifecycle management"
    color: "#45B7D1"
    icon: "Package"

  telemetry-api:
    defaultLabel: "Telemetry API"
    description: "Telemetry data retrieval, metadata, and formatting"
    color: "#45B7D1"
    icon: "BarChart"

  composition-api:
    defaultLabel: "Composition API"
    description: "Hierarchical object composition and relationships"
    color: "#45B7D1"
    icon: "Link"

  time-api:
    defaultLabel: "Time API"
    description: "Time systems, bounds, clocks, and conductor"
    color: "#45B7D1"
    icon: "Clock"

  actions-api:
    defaultLabel: "Actions API"
    description: "Context menus and user actions"
    color: "#45B7D1"
    icon: "Zap"

  # Registry Components
  registry:
    defaultLabel: "Registry"
    description: "Extensible registry for providers and components"
    color: "#96CEB4"
    icon: "ClipboardList"

  view-registry:
    defaultLabel: "View Registry"
    description: "Manages object view providers"
    color: "#88D8B0"
    icon: "Eye"

  type-registry:
    defaultLabel: "Type Registry"
    description: "Domain object type definitions"
    color: "#88D8B0"
    icon: "Tag"

  toolbar-registry:
    defaultLabel: "Toolbar Registry"
    description: "Toolbar view providers"
    color: "#88D8B0"
    icon: "Wrench"

  inspector-registry:
    defaultLabel: "Inspector Registry"
    description: "Inspector panel view providers"
    color: "#88D8B0"
    icon: "Search"

  # Plugin System Components
  plugin:
    defaultLabel: "Plugin"
    description: "Installable feature plugin"
    color: "#FFA07A"
    icon: "Puzzle"

  visualization-plugin:
    defaultLabel: "Visualization Plugin"
    description: "Data visualization plugin (Plot, Table, Imagery, Gauge, etc.)"
    color: "#FF8C69"
    icon: "LineChart"

  layout-plugin:
    defaultLabel: "Layout Plugin"
    description: "Layout and container plugin (DisplayLayout, FlexibleLayout, Tabs, etc.)"
    color: "#FF8C69"
    icon: "Layout"

  telemetry-plugin:
    defaultLabel: "Telemetry Plugin"
    description: "Telemetry processing plugin (TimeConductor, Correlation, Mean, etc.)"
    color: "#FF8C69"
    icon: "Radio"

  action-plugin:
    defaultLabel: "Action Plugin"
    description: "User action plugin (Export, Import, Move, Remove, etc.)"
    color: "#FF8C69"
    icon: "Command"

  persistence-plugin:
    defaultLabel: "Persistence Plugin"
    description: "Data persistence adapter (CouchDB, LocalStorage, etc.)"
    color: "#FF8C69"
    icon: "Database"

  system-plugin:
    defaultLabel: "System Plugin"
    description: "System-level plugin (FaultManagement, Condition, Timer, etc.)"
    color: "#FF8C69"
    icon: "Server"

  theme-plugin:
    defaultLabel: "Theme Plugin"
    description: "Visual theme plugin (Darkmatter, Espresso, Snow)"
    color: "#FF8C69"
    icon: "Palette"

  # UI Layer Components
  ui-layer:
    defaultLabel: "UI Layer"
    description: "Vue-based user interface layer"
    color: "#9B59B6"
    icon: "Monitor"

  app-layout:
    defaultLabel: "App Layout"
    description: "Main application shell and layout (AppLayout.vue)"
    color: "#8E44AD"
    icon: "Layout"

  browse-bar:
    defaultLabel: "Browse Bar"
    description: "Top navigation bar"
    color: "#8E44AD"
    icon: "Navigation"

  object-tree:
    defaultLabel: "Object Tree"
    description: "Left sidebar object tree navigation"
    color: "#8E44AD"
    icon: "TreePine"

  ui-component:
    defaultLabel: "UI Component"
    description: "Reusable Vue UI component"
    color: "#8E44AD"
    icon: "Component"

  router:
    defaultLabel: "Router"
    description: "Application routing system"
    color: "#8E44AD"
    icon: "Navigation"

  # Utility Components
  utilities:
    defaultLabel: "Utilities"
    description: "Shared utility functions and helpers"
    color: "#F39C12"
    icon: "Wrench"

  selection-system:
    defaultLabel: "Selection System"
    description: "Centralized selection state management"
    color: "#F39C12"
    icon: "Hand"

  exporter:
    defaultLabel: "Exporter"
    description: "Data export functionality (JSON, CSV, Image)"
    color: "#F39C12"
    icon: "Download"

  # External Dependencies
  external-lib:
    defaultLabel: "External Library"
    description: "Third-party library dependency"
    color: "#95A5A6"
    icon: "Book"

  vue:
    defaultLabel: "Vue.js"
    description: "Frontend framework for UI components"
    color: "#42B883"
    icon: "Zap"

  d3:
    defaultLabel: "D3.js"
    description: "Data visualization library"
    color: "#F9A03C"
    icon: "BarChart"

  eventemitter:
    defaultLabel: "EventEmitter3"
    description: "Event system library"
    color: "#7F8C8D"
    icon: "Radio"

edgeComponents:
  extends:
    label: "extends"
    description: "Inheritance or extension relationship"
    color: "#2C3E50"

  uses:
    label: "uses"
    description: "Usage dependency"
    color: "#34495E"

  provides:
    label: "provides"
    description: "Provides functionality or service"
    color: "#27AE60"

  registers-with:
    label: "registers with"
    description: "Registers with a registry"
    color: "#3498DB"

  installs:
    label: "installs"
    description: "Installs or initializes"
    color: "#E74C3C"

  emits-to:
    label: "emits to"
    description: "Emits events to"
    color: "#9B59B6"

  contains:
    label: "contains"
    description: "Contains or composes"
    color: "#16A085"

eventSchemas:
  # Object Operations Events
  object.save.started:
    description: "Object save operation initiated"
    attributes:
      object.identifier:
        type: string
        description: "Unique identifier of the object being saved"
      object.type:
        type: string
        description: "Type of the domain object"
      operation:
        type: string
        description: "Type of operation (create, update)"

  object.provider.called:
    description: "Persistence provider invoked"
    attributes:
      provider.name:
        type: string
        description: "Name of the persistence provider"
      provider.namespace:
        type: string
        description: "Namespace handled by the provider"

  object.save.completed:
    description: "Object successfully saved"
    attributes:
      object.identifier:
        type: string
        description: "Identifier of the saved object"
      duration.ms:
        type: number
        description: "Time taken to save in milliseconds"

  object.save.failed:
    description: "Object save operation failed"
    attributes:
      error.type:
        type: string
        description: "Type of error encountered"
      error.message:
        type: string
        description: "Error message describing the failure"

  # Telemetry Events
  telemetry.request.started:
    description: "Telemetry data request initiated"
    attributes:
      object.identifier:
        type: string
        description: "Identifier of telemetry object"
      time.start:
        type: number
        description: "Start time of requested data range"
      time.end:
        type: number
        description: "End time of requested data range"
      request.type:
        type: string
        description: "Type of telemetry request"

  telemetry.provider.queried:
    description: "Telemetry provider queried for data"
    attributes:
      provider.name:
        type: string
        description: "Name of telemetry provider"
      provider.type:
        type: string
        description: "Type of telemetry provider"

  telemetry.data.received:
    description: "Telemetry data received from provider"
    attributes:
      data.points:
        type: number
        description: "Number of data points received"
      data.bytes:
        type: number
        description: "Size of data in bytes"

  telemetry.format.applied:
    description: "Data formatted for display"
    attributes:
      formatter.name:
        type: string
        description: "Name of the formatter used"
      format.type:
        type: string
        description: "Type of format applied"

  telemetry.request.completed:
    description: "Telemetry request completed successfully"
    attributes:
      duration.ms:
        type: number
        description: "Request duration in milliseconds"
      points.count:
        type: number
        description: "Total points retrieved"

  telemetry.request.failed:
    description: "Telemetry request failed"
    attributes:
      error.type:
        type: string
        description: "Type of error"
      error.message:
        type: string
        description: "Error message"

  telemetry.subscribe.started:
    description: "Real-time telemetry subscription initiated"
    attributes:
      object.identifier:
        type: string
        description: "Identifier of subscribed object"
      subscription.type:
        type: string
        description: "Type of subscription"

  telemetry.data.streaming:
    description: "Real-time telemetry data received"
    attributes:
      data.point:
        type: object
        description: "Received data point"
      timestamp:
        type: number
        description: "Timestamp of data point"

  # Plugin Lifecycle Events
  plugin.install.started:
    description: "Plugin installation initiated"
    attributes:
      plugin.name:
        type: string
        description: "Name of the plugin being installed"
      plugin.type:
        type: string
        description: "Type/category of plugin"
      plugin.options:
        type: object
        description: "Plugin configuration options"

  plugin.types.registered:
    description: "Object types registered by plugin"
    attributes:
      types.count:
        type: number
        description: "Number of types registered"
      types.names:
        type: array
        description: "Names of registered types"

  plugin.views.registered:
    description: "View providers registered by plugin"
    attributes:
      views.count:
        type: number
        description: "Number of view providers registered"
      views.names:
        type: array
        description: "Names of registered views"

  plugin.providers.registered:
    description: "Providers registered by plugin"
    attributes:
      providers.count:
        type: number
        description: "Number of providers registered"
      providers.types:
        type: array
        description: "Types of providers registered"

  plugin.install.completed:
    description: "Plugin successfully installed"
    attributes:
      duration.ms:
        type: number
        description: "Installation duration in milliseconds"
      registrations.total:
        type: number
        description: "Total number of registrations made"

  plugin.install.failed:
    description: "Plugin installation failed"
    attributes:
      error.type:
        type: string
        description: "Type of error"
      error.message:
        type: string
        description: "Error message"
      error.stack:
        type: string
        description: "Error stack trace"

  # View Rendering Events
  view.match.started:
    description: "View provider matching initiated"
    attributes:
      object.identifier:
        type: string
        description: "Identifier of object to render"
      object.type:
        type: string
        description: "Type of object"

  view.providers.evaluated:
    description: "View providers evaluated for compatibility"
    attributes:
      providers.count:
        type: number
        description: "Total providers evaluated"
      providers.matched:
        type: number
        description: "Number of matching providers"
      providers.names:
        type: array
        description: "Names of matching providers"

  view.provider.selected:
    description: "View provider selected based on priority"
    attributes:
      provider.name:
        type: string
        description: "Name of selected provider"
      provider.priority:
        type: number
        description: "Priority value of selected provider"
      provider.key:
        type: string
        description: "Unique key of the provider"

  view.component.created:
    description: "Vue component created for view"
    attributes:
      component.name:
        type: string
        description: "Name of the Vue component"
      component.type:
        type: string
        description: "Type of component"

  view.mounted:
    description: "View successfully mounted in DOM"
    attributes:
      duration.ms:
        type: number
        description: "Time to mount in milliseconds"
      element.id:
        type: string
        description: "DOM element ID where view is mounted"

  view.no.providers:
    description: "No view providers matched object"
    attributes:
      object.type:
        type: string
        description: "Type of object with no matching providers"
      providers.evaluated:
        type: number
        description: "Number of providers evaluated"

  view.render.failed:
    description: "View rendering failed"
    attributes:
      error.type:
        type: string
        description: "Type of error"
      error.message:
        type: string
        description: "Error message"
